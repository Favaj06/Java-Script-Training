<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <link rel="stylesheet" href="css/card.css">
</head>
<body>

    <article class="card">

        <img
            src="https://placehold.co/320x200"
            alt="Profile placeholder image"
        >

        <header class="card-header">
            <h2>Mohamed Al Favaj M</h2>
            <p class="job-title">Aspiring Full Stack Developer</p>
        </header>

        <p class="bio">
            Passionate about Full Stack Development, Artificial Intelligence,
            and building user-friendly applications. Continuously learning
            modern technologies and software engineering practices.
        </p>

        <a href="mailto:example@email.com" class="contact-btn">
            Contact
        </a>

    </article>

</body>
</html>
