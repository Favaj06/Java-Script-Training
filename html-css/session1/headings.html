<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heading Hierarchy</title>
</head>
<body>

    <h1>My Portfolio</h1>

    <h2>About Me</h2>

    <h2>Skills</h2>

    <h3>JavaScript</h3>

    <h2>Contact</h2>

    <!--
    What heading level should directly follow an <h1>?

    An <h2> should directly follow an <h1> because heading tags
    should follow a logical hierarchy without skipping levels.

    Why does heading hierarchy matter?

    1. Accessibility:
       Screen readers use headings to help users navigate a page.

    2. SEO:
       Search engines use headings to understand the structure
       and importance of content on a webpage.

    3. Readability:
       Proper heading levels make content easier to organize
       and understand.
    -->

</body>
</html>
